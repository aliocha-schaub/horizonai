<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HorizonAI — Knowledge Base</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F4F2EF; font-family: 'Montserrat', system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D0CAC0; border-radius: 4px; }
  @keyframes bounce { 0%,80%,100%{transform:scale(.7);opacity:.3} 40%{transform:scale(1);opacity:1} }
  @keyframes pulse-dot { 0%,100%{opacity:.4;transform:scale(.9)} 50%{opacity:1;transform:scale(1.1)} }
  .role-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.10) !important; }
  .quick-btn:hover { border-color: #2E4058 !important; color: #FFFFFF !important; }
  .chip:hover { border-color: #B8965A !important; color: #1B2A3B !important; }
  .switch-btn:hover { color: #A8B8C8 !important; }
  .src-chip:hover { opacity: 0.75; }
  .chat-input::placeholder { color: #9CA3AF; }
  textarea { font-family: 'Montserrat', system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const WORKER_URL = "https://noisy-sun-7dea.aliocha.workers.dev";

const C = {
  navy: "#1B2A3B", navyLight: "#2E4058",
  gold: "#B8965A", teal: "#3A7D8C",
  white: "#FFFFFF", offwhite: "#F8F6F3", bg: "#F4F2EF",
  border: "#E2DDD6", text: "#1B2A3B",
  textMuted: "#5A6475", textLight: "#8A9099",
};

const ROLES = {
  manager: { label: "Manager / Leadership", icon: "◆", color: C.gold, borderColor: "#D4AF7A", bg: "#FDFAF5", accessNote: "Full access — all documents & confidential data" },
  operations: { label: "Operations Staff", icon: "◇", color: C.teal, borderColor: "#4E9BAC", bg: "#F3F9FA", accessNote: "Standard access — processes, standards & ops docs" },
};

const SUGGESTIONS = {
  manager: ["HP property bible", "Invoice approval process", "Operations transition plan", "KYC requirements"],
  operations: ["Cap Marina checklist", "KYC documents needed", "Cleaning standards", "Check-in process"],
};

const buildSystemPrompt = (role) => `You are HorizonAI, the internal knowledge assistant for Horizon Group — a premium hospitality and property management company in Mauritius (~100 properties, ~80 staff, founded 2008). Divisions: Horizon Holidays (STR), Horizon Properties (LTR), Horizon Projects, HPP Consulting.

Answer directly and concisely from the document content provided. Use bullet points for multi-step processes. Always end with a 📄 Sources section. If documents don't contain the answer, say so. Answer in the same language as the question (French or English). Never invent information.

ACCESS LEVEL: ${role === "manager"
  ? "MANAGER — share all information including financial, HR and confidential content."
  : "OPERATIONS — do NOT share salary data, performance reviews, or confidential management information."}`;

const { useState, useRef, useEffect } = React;

function HorizonAI() {
  const [screen, setScreen] = useState("login");
  const [role, setRole] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [loadingStatus, setLoadingStatus] = useState("");
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

  const sendMessage = async (text) => {
    const userText = text || input.trim();
    if (!userText || loading) return;
    setInput("");
    const newMessages = [...messages, { role: "user", content: userText }];
    setMessages(newMessages);
    setLoading(true);

    try {
      // Step 1: Search via Cloudflare Worker (handles CORS)
      setLoadingStatus("Searching Shared Drives…");
      const params = new URLSearchParams({ query: userText, role });
      const driveRes = await fetch(`${WORKER_URL}/search?${params.toString()}`);
      const driveData = await driveRes.json();
      if (driveData.error) throw new Error("Drive: " + driveData.error);

      const docs = driveData.documents || [];
      setLoadingStatus(`Reading ${docs.length} document${docs.length !== 1 ? "s" : ""}…`);

      const docContext = docs.length === 0
        ? "No documents found in Shared Drives for this query."
        : docs.map((d, i) =>
            `--- DOCUMENT ${i + 1}: ${d.name} ---\nURL: ${d.url}\nLast modified: ${d.modifiedTime || "unknown"}\n\nCONTENT:\n${d.content || d.snippet || "(No content)"}`
          ).join("\n\n");

      // Step 2: Claude synthesises
      setLoadingStatus("Generating answer…");
      const claudeRes = await fetch(`${WORKER_URL}/claude`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: buildSystemPrompt(role),
          messages: [
            ...newMessages.slice(0, -1),
            { role: "user", content: `RETRIEVED DOCUMENTS:\n\n${docContext}\n\n---\n\nQUESTION: ${userText}` }
          ],
        }),
      });

      const claudeData = await claudeRes.json();
      if (claudeData.error) throw new Error("Claude: " + (claudeData.error.message || JSON.stringify(claudeData.error)));

      const reply = claudeData.content?.filter(b => b.type === "text").map(b => b.text).join("\n").trim() || "Couldn't generate a response.";

      setMessages([...newMessages, {
        role: "assistant", content: reply,
        sources: docs.filter(d => d.url).map(d => ({ name: d.name, url: d.url }))
      }]);

    } catch (err) {
      setMessages([...newMessages, { role: "assistant", content: `Something went wrong: ${err.message}\n\nIf this keeps happening, contact Aliocha.` }]);
    }

    setLoading(false);
    setLoadingStatus("");
    setTimeout(() => inputRef.current?.focus(), 100);
  };

  const handleKey = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  if (screen === "login") return (
    <div style={s.page}>
      <header style={s.header}>
        <div style={s.headerInner}>
          <div style={s.logo}><span style={s.logoH}>HORIZON</span><span style={s.logoGroup}>&nbsp;Group</span></div>
          <div style={s.headerPill}>Internal Platform</div>
        </div>
      </header>
      <div style={s.hero}>
        <div style={s.heroInner}>
          <div style={s.heroEyebrow}>KNOWLEDGE BASE</div>
          <h1 style={s.heroTitle}>Your Documents,<br />Instantly Searchable</h1>
          <p style={s.heroSub}>Search Horizon's Shared Drives in real time — SOPs, checklists, contracts and more.</p>
        </div>
      </div>
      <div style={s.loginBody}>
        <div style={s.sectionLabel}>SELECT YOUR ACCESS LEVEL</div>
        <div style={s.roleCards}>
          {Object.entries(ROLES).map(([key, r]) => (
            <button key={key} className="role-card" style={{ ...s.roleCard, borderTop: `3px solid ${r.color}` }}
              onClick={() => { setRole(key); setScreen("chat"); }}>
              <div style={{ ...s.roleCardIcon, color: r.color }}>{r.icon}</div>
              <div style={s.roleCardLabel}>{r.label}</div>
              <div style={s.roleCardNote}>{r.accessNote}</div>
              <div style={{ ...s.roleCardCta, color: r.color }}>Enter →</div>
            </button>
          ))}
        </div>
        <div style={s.loginFooter}>
          <div style={s.footerDot} />
          <span style={s.footerText}>Connected to Horizon Shared Drives</span>
        </div>
      </div>
    </div>
  );

  const currentRole = ROLES[role];
  return (
    <div style={s.appWrap}>
      <aside style={s.sidebar}>
        <div style={s.sideHeader}>
          <div style={s.sideLogo}><span style={s.sideLogoH}>HORIZON</span><span style={s.sideLogoG}>&nbsp;Group</span></div>
          <div style={s.sideTagline}>AI Knowledge Base</div>
        </div>
        <div style={s.sideDivider} />
        <div style={s.sideSection}>
          <div style={s.sideSectionLabel}>ACCESS LEVEL</div>
          <div style={{ ...s.sideBadge, borderLeft: `3px solid ${currentRole.color}`, background: currentRole.bg }}>
            <span style={{ color: currentRole.color, fontWeight: "700", fontSize: "13px" }}>{currentRole.icon}</span>
            <div style={{ ...s.sideBadgeLabel, color: C.text }}>{currentRole.label}</div>
          </div>
        </div>
        <div style={s.sideSection}>
          <div style={s.sideSectionLabel}>QUICK QUESTIONS</div>
          <div style={s.quickList}>
            {SUGGESTIONS[role].map((q) => (
              <button key={q} className="quick-btn" style={s.quickBtn} onClick={() => sendMessage(q)}>
                <span style={{ color: currentRole.color, marginRight: "6px", fontSize: "9px" }}>▶</span>{q}
              </button>
            ))}
          </div>
        </div>
        <div style={{ flex: 1 }} />
        <button className="switch-btn" style={s.switchBtn} onClick={() => { setScreen("login"); setMessages([]); }}>← Change role</button>
      </aside>

      <main style={s.main}>
        <div style={s.topBar}>
          <div>
            <div style={s.topBarTitle}>Company Knowledge Base</div>
            <div style={s.topBarSub}>Searches your Shared Drives in real time</div>
          </div>
          <div style={{ ...s.topBarBadge, color: currentRole.color, background: currentRole.bg, borderColor: currentRole.borderColor }}>
            {currentRole.icon}&nbsp;{currentRole.label}
          </div>
        </div>

        <div style={s.messages}>
          {messages.length === 0 && (
            <div style={s.empty}>
              <div style={{ ...s.emptyAccent, background: currentRole.color }} />
              <div style={s.emptyTitle}>What do you need to find?</div>
              <div style={s.emptyDesc}>I'll search your Shared Drives and answer from the actual documents.</div>
              <div style={s.chips}>
                {SUGGESTIONS[role].map((q) => (
                  <button key={q} className="chip" style={s.chip} onClick={() => sendMessage(q)}>{q}</button>
                ))}
              </div>
            </div>
          )}
          {messages.map((msg, i) => (
            <div key={i} style={{ ...s.msgRow, justifyContent: msg.role === "user" ? "flex-end" : "flex-start" }}>
              {msg.role === "assistant" && <div style={s.avatar}><span style={s.avatarText}>H</span></div>}
              <div style={{ ...s.bubble, ...(msg.role === "user" ? { ...s.userBubble, background: currentRole.color } : s.aiBubble) }}>
                <div style={s.bubbleText}>{msg.content}</div>
                {msg.sources?.length > 0 && (
                  <div style={s.sourcesRow}>
                    {msg.sources.map((src, j) => (
                      <a key={j} href={src.url} target="_blank" rel="noopener noreferrer" style={s.srcChip} className="src-chip">📄 {src.name}</a>
                    ))}
                  </div>
                )}
              </div>
            </div>
          ))}
          {loading && (
            <div style={{ ...s.msgRow, justifyContent: "flex-start" }}>
              <div style={s.avatar}><span style={s.avatarText}>H</span></div>
              <div style={{ ...s.bubble, ...s.aiBubble }}>
                <div style={s.loadingRow}>
                  <div style={s.dots}>{[0,150,300].map((d,i) => <span key={i} style={{ ...s.dot, animationDelay: `${d}ms` }} />)}</div>
                  <span style={s.loadingLabel}>{loadingStatus}</span>
                </div>
              </div>
            </div>
          )}
          <div ref={messagesEndRef} />
        </div>

        <div style={s.inputArea}>
          <div style={s.inputWrap}>
            <textarea ref={inputRef} className="chat-input" style={s.textarea}
              placeholder="Ask anything — I'll search your Shared Drives for the answer…"
              value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey} rows={1} />
            <button style={{ ...s.sendBtn, opacity: input.trim() && !loading ? 1 : 0.3, background: currentRole.color }}
              onClick={() => sendMessage()} disabled={!input.trim() || loading}>↑</button>
          </div>
          <div style={s.inputHint}>Enter to send · Shift+Enter for new line</div>
        </div>
      </main>
    </div>
  );
}

const s = {
  page: { minHeight: "100vh", background: "#F4F2EF", display: "flex", flexDirection: "column" },
  header: { background: "#1B2A3B", padding: "0 40px", height: "64px", display: "flex", alignItems: "center", flexShrink: 0 },
  headerInner: { maxWidth: "900px", width: "100%", margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" },
  logo: { display: "flex", alignItems: "baseline" },
  logoH: { fontSize: "18px", fontWeight: "800", color: "#FFFFFF", letterSpacing: "3px" },
  logoGroup: { fontSize: "15px", fontWeight: "300", color: "#A8B8C8", letterSpacing: "1px" },
  headerPill: { fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase", color: "#A8B8C8", border: "1px solid #2E4058", borderRadius: "20px", padding: "4px 12px" },
  hero: { background: "#1B2A3B", padding: "48px 40px 56px" },
  heroInner: { maxWidth: "900px", margin: "0 auto" },
  heroEyebrow: { fontSize: "10px", letterSpacing: "3px", color: "#B8965A", fontWeight: "600", marginBottom: "12px" },
  heroTitle: { fontSize: "36px", fontWeight: "700", color: "#FFFFFF", lineHeight: 1.2, marginBottom: "12px" },
  heroSub: { fontSize: "15px", color: "#A8B8C8", lineHeight: 1.7, maxWidth: "480px" },
  loginBody: { maxWidth: "900px", width: "100%", margin: "0 auto", padding: "40px 40px 32px" },
  sectionLabel: { fontSize: "10px", letterSpacing: "2.5px", color: "#8A9099", fontWeight: "600", marginBottom: "16px" },
  roleCards: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px", marginBottom: "32px" },
  roleCard: { background: "#FFFFFF", border: "1px solid #E2DDD6", borderRadius: "8px", padding: "24px", cursor: "pointer", textAlign: "left", transition: "all 0.2s", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" },
  roleCardIcon: { fontSize: "22px", marginBottom: "10px" },
  roleCardLabel: { fontSize: "15px", fontWeight: "700", color: "#1B2A3B", marginBottom: "6px" },
  roleCardNote: { fontSize: "12px", color: "#5A6475", lineHeight: 1.5, marginBottom: "16px" },
  roleCardCta: { fontSize: "12px", fontWeight: "600", letterSpacing: "0.5px" },
  loginFooter: { display: "flex", alignItems: "center", gap: "8px", justifyContent: "center" },
  footerDot: { width: "7px", height: "7px", borderRadius: "50%", background: "#B8965A", animation: "pulse-dot 2s ease-in-out infinite" },
  footerText: { fontSize: "12px", color: "#8A9099" },
  appWrap: { display: "flex", height: "100vh", overflow: "hidden" },
  sidebar: { width: "240px", flexShrink: 0, background: "#1B2A3B", display: "flex", flexDirection: "column", padding: "0 0 20px 0" },
  sideHeader: { padding: "20px 20px 16px" },
  sideLogo: { display: "flex", alignItems: "baseline", marginBottom: "4px" },
  sideLogoH: { fontSize: "15px", fontWeight: "800", color: "#FFFFFF", letterSpacing: "3px" },
  sideLogoG: { fontSize: "13px", fontWeight: "300", color: "#A8B8C8", letterSpacing: "1px" },
  sideTagline: { fontSize: "10px", letterSpacing: "2px", color: "#B8965A", fontWeight: "600" },
  sideDivider: { height: "1px", background: "#2E4058", marginBottom: "20px" },
  sideSection: { padding: "0 16px 20px" },
  sideSectionLabel: { fontSize: "9px", letterSpacing: "2.5px", color: "#607080", fontWeight: "600", textTransform: "uppercase", marginBottom: "10px" },
  sideBadge: { borderRadius: "6px", padding: "10px 12px", display: "flex", alignItems: "center", gap: "10px" },
  sideBadgeLabel: { fontSize: "12px", fontWeight: "600" },
  quickList: { display: "flex", flexDirection: "column", gap: "6px" },
  quickBtn: { background: "none", border: "1px solid #2E4058", borderRadius: "6px", padding: "8px 10px", fontSize: "11px", color: "#A8B8C8", cursor: "pointer", textAlign: "left", lineHeight: 1.4, transition: "all 0.15s" },
  switchBtn: { margin: "0 16px", background: "none", border: "1px solid #2E4058", borderRadius: "6px", color: "#607080", fontSize: "11px", padding: "8px 12px", cursor: "pointer", width: "calc(100% - 32px)", transition: "all 0.15s", textAlign: "center" },
  main: { flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", background: "#FFFFFF" },
  topBar: { padding: "16px 28px", borderBottom: "1px solid #E2DDD6", background: "#FFFFFF", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 },
  topBarTitle: { fontSize: "15px", fontWeight: "700", color: "#1B2A3B" },
  topBarSub: { fontSize: "11px", color: "#8A9099", marginTop: "2px" },
  topBarBadge: { fontSize: "11px", fontWeight: "700", padding: "5px 14px", borderRadius: "20px", border: "1px solid" },
  messages: { flex: 1, overflowY: "auto", padding: "28px", display: "flex", flexDirection: "column", gap: "20px", background: "#F8F6F3" },
  empty: { margin: "auto", maxWidth: "480px", width: "100%", display: "flex", flexDirection: "column", alignItems: "center", textAlign: "center", gap: "14px", padding: "40px 20px" },
  emptyAccent: { width: "40px", height: "3px", borderRadius: "2px", marginBottom: "4px" },
  emptyTitle: { fontSize: "22px", fontWeight: "700", color: "#1B2A3B" },
  emptyDesc: { fontSize: "13px", color: "#5A6475", lineHeight: 1.7, maxWidth: "340px" },
  chips: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", width: "100%", marginTop: "4px" },
  chip: { background: "#FFFFFF", border: "1px solid #E2DDD6", borderRadius: "8px", padding: "12px 14px", fontSize: "12px", color: "#5A6475", cursor: "pointer", textAlign: "left", lineHeight: 1.4, transition: "all 0.15s", fontWeight: "500" },
  msgRow: { display: "flex", alignItems: "flex-end", gap: "10px" },
  avatar: { width: "32px", height: "32px", borderRadius: "6px", background: "#1B2A3B", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 },
  avatarText: { fontSize: "13px", fontWeight: "800", color: "#FFFFFF", letterSpacing: "1px" },
  bubble: { maxWidth: "72%", borderRadius: "12px", padding: "13px 17px", fontSize: "13px", lineHeight: 1.7 },
  userBubble: { color: "#FFFFFF", borderBottomRightRadius: "3px", fontWeight: "500" },
  aiBubble: { background: "#FFFFFF", color: "#1B2A3B", border: "1px solid #E2DDD6", borderBottomLeftRadius: "3px", boxShadow: "0 1px 4px rgba(0,0,0,0.05)" },
  bubbleText: { whiteSpace: "pre-wrap" },
  sourcesRow: { display: "flex", flexWrap: "wrap", gap: "6px", marginTop: "10px", paddingTop: "10px", borderTop: "1px solid #E2DDD6" },
  srcChip: { fontSize: "11px", color: "#3A7D8C", background: "#EFF6F7", border: "1px solid #C0DDE2", borderRadius: "4px", padding: "3px 9px", textDecoration: "none", fontWeight: "500" },
  loadingRow: { display: "flex", alignItems: "center", gap: "10px" },
  dots: { display: "flex", gap: "4px" },
  dot: { width: "6px", height: "6px", borderRadius: "50%", background: "#C8C0B4", display: "inline-block", animation: "bounce 1.2s ease-in-out infinite" },
  loadingLabel: { fontSize: "12px", color: "#8A9099", fontStyle: "italic" },
  inputArea: { padding: "14px 28px 16px", borderTop: "1px solid #E2DDD6", background: "#FFFFFF", flexShrink: 0 },
  inputWrap: { display: "flex", gap: "10px", background: "#F8F6F3", border: "1px solid #E2DDD6", borderRadius: "10px", padding: "10px 12px", alignItems: "flex-end" },
  textarea: { flex: 1, background: "none", border: "none", outline: "none", color: "#1B2A3B", fontSize: "13px", resize: "none", lineHeight: 1.5, maxHeight: "120px", overflowY: "auto" },
  sendBtn: { width: "34px", height: "34px", border: "none", borderRadius: "8px", color: "#FFFFFF", fontSize: "16px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontWeight: "bold", transition: "opacity 0.2s" },
  inputHint: { fontSize: "10px", color: "#8A9099", marginTop: "6px", textAlign: "center" },
};

ReactDOM.render(React.createElement(HorizonAI), document.getElementById("root"));
</script>
</body>
</html>
